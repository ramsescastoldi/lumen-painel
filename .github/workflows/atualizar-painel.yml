name: Atualiza painel diariamente

on:
  schedule:
    # 05:55 BRT (UTC-3) = 08:55 UTC. Roda seg-sex (1-5). Backup do agendador n8n
    - cron: '55 8 * * 1-5'
  workflow_dispatch:
    # Permite rodar manualmente pelo botão "Run workflow" na UI do GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar data.json novo via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: claude-haiku-4-5-20251001
          TZ: America/Cuiaba
        run: node scripts/gerar-painel.mjs

      - name: Decisão do Dia (motor determinístico — zero IA)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          TZ: America/Cuiaba
        run: |
          npm install pg@8 --no-save --silent || echo "⚠️ pg não instalou — decisao roda em modo degradado"
          node scripts/decisao.mjs

      - name: Histórico — snapshot diário (rolling 30 dias)
        env:
          TZ: America/Cuiaba
        run: node scripts/historico.mjs

      - name: Commitar mudanças (se houver)
        run: |
          git config user.name "Bot Lumen Painel"
          git config user.email "bot@lumenposto.com"
          if git diff --quiet data.json history.json; then
            echo "ℹ️  Nenhuma mudança — nada a commitar"
            exit 0
          fi
          DATE_BR=$(TZ=America/Cuiaba date +"%d/%m/%Y %H:%M")
          git add data.json history.json
          git commit -m "📊 painel diário automático — $DATE_BR"
          # Race-safe push: se outro run commitou antes, faz rebase e tenta de novo
          for i in 1 2 3; do
            if git push; then
              echo "✓ Commit feito (tentativa $i)"
              exit 0
            fi
            echo "⚠️ Push rejeitado, fazendo rebase..."
            git pull --rebase origin main
          done
          echo "❌ Push falhou após 3 tentativas"
          exit 1

      - name: Gerar versão WhatsApp (texto) do painel
        if: success()
        run: node scripts/whatsapp-text.mjs

      - name: Notificar n8n com detalhes do painel
        if: success()
        continue-on-error: true
        env:
          N8N_NOTIFY_URL: ${{ secrets.N8N_NOTIFY_URL }}
          TZ: America/Cuiaba
        run: |
          if [ -z "$N8N_NOTIFY_URL" ]; then
            echo "ℹ️  N8N_NOTIFY_URL não configurada — pulando notificação"
            exit 0
          fi
          # Extrai campos do data.json gerado para incluir no payload
          MANCHETE=$(node -e "const d=JSON.parse(require('fs').readFileSync('data.json','utf8')); process.stdout.write((d.manchete?.principal?.titulo||'').slice(0,200))")
          DATE_LABEL=$(node -e "const d=JSON.parse(require('fs').readFileSync('data.json','utf8')); process.stdout.write(d.meta?.date_label||'')")
          NOW=$(TZ=America/Cuiaba date +"%H:%M")
          DATE_ISO=$(TZ=America/Cuiaba date +"%Y-%m-%d")
          # wa-text.txt (gerado no step anterior) vai inteiro no payload via --rawfile
          [ -f wa-text.txt ] || echo "" > wa-text.txt
          # Monta payload JSON usando jq para escape correto
          PAYLOAD=$(jq -n \
            --arg status "ok" \
            --arg date "$DATE_ISO" \
            --arg date_label "$DATE_LABEL" \
            --arg time "$NOW" \
            --arg manchete "$MANCHETE" \
            --arg workflow "lumen-painel-diario" \
            --rawfile wa_text wa-text.txt \
            '{status:$status,date:$date,date_label:$date_label,time:$time,manchete:$manchete,workflow:$workflow,wa_text:$wa_text}')
          curl -s -X POST "$N8N_NOTIFY_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
          echo ""
          echo "✓ n8n notificado (com versão WhatsApp)"
